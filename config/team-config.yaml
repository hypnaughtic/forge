# ==============================================================================
# Forge — AI Software Forge — Project Configuration
# Generated by: ./forge init
# ==============================================================================

project:
  description: "Simple Chatbot with UI, using LLM Gateway with local-claude"
  requirements_file: "config/project-requirements.md"
  type: "new"
  existing_project_path: ""
  directory: "/Users/rushabhthakkar/Desktop/workspace/projects/chatbot/."

mode: "mvp"
strategy: "auto-pilot"

# --- Orchestration Backend ---
# Controls how agents are spawned and coordinated.
# agent-teams  — Uses Claude Code's Agent Teams (recommended, requires experimental flag)
# tmux         — Uses tmux windows + file-based messaging (works everywhere)
orchestration: "agent-teams"

cost:
  max_development_cost: 50
  max_project_runtime_cost: "no-cap"

agents:
  team_profile: "auto"
  exclude: []
  additional: []
  include: []

claude_md:
  source: "both"
  priority: "project-first"
  global_path: ""
  project_path: ""

tech_stack:
  languages: []
  frameworks: []
  databases: []
  infrastructure: []

llm_gateway:
  local_claude_model: "claude-sonnet-4-20250514"
  enable_local_claude: true
  cost_tracking: true

bootstrap_template: "auto"

session:
  snapshot_retention: 5
  auto_stop_after_hours: 0
  shutdown_grace_period_seconds: 60

usage_limits:
  proactive_save_interval_hours: 4
  estimated_refresh_window_hours: 1
  auto_resume_after_limit: true
  fleet_limit_threshold: 3
  scheduled_resume_time: ""
