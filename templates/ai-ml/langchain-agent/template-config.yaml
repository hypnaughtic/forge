name: langchain-agent
description: LangChain/LangGraph agent with llm-gateway integration for centralized LLM routing
category: ai-ml
languages:
  - python
frameworks:
  - langchain
  - langgraph
  - llm-gateway
tags:
  - ai-agent
  - llm
  - tool-calling
  - state-machine
  - llm-gateway
min_python_version: "3.11"
min_mode: mvp
scaffold_dir: scaffold
post_create_commands:
  - "python -m venv .venv"
  - "pip install -r requirements.txt"
  - "cp .env.example .env"
