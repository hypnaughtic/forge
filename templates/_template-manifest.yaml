               "structured output parsing", "llm-gateway abstraction for vendor-agnostic LLM calls"]
    min_mode: "mvp"
    status: "full"
    notes: "All LLM calls MUST go through llm-gateway, not direct LangChain LLM providers."

  - name: "temporal-ai-workflow"
