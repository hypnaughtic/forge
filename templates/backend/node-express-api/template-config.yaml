name: node-express-api
description: Express.js API with TypeScript, Prisma ORM, and JWT authentication
category: backend
languages:
  - typescript
  - javascript
frameworks:
  - express
  - prisma
  - zod
tags:
  - rest-api
  - jwt-auth
  - postgres
  - docker
  - typescript
min_node_version: "20"
min_mode: mvp
scaffold_dir: scaffold
post_create_commands:
  - "npm install"
  - "cp .env.example .env"
  - "npx prisma generate"
