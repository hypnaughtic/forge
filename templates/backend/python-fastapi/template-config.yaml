name: python-fastapi
description: Production-ready FastAPI backend with SQLAlchemy, Alembic, and Pydantic v2
category: backend
languages:
  - python
frameworks:
  - fastapi
  - sqlalchemy
  - alembic
tags:
  - rest-api
  - async
  - postgres
  - docker
  - pydantic
min_python_version: "3.11"
min_mode: mvp
scaffold_dir: scaffold
post_create_commands:
  - "python -m venv .venv"
  - "pip install -r requirements.txt"
  - "cp .env.example .env"
