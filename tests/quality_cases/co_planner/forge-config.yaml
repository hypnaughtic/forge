project:
  description: >-
    co-planner — AI-powered diagram co-pilot that provides real-time node/edge
    suggestions on a React Flow canvas. Multi-tier suggestion engine with
    pattern matching, graph-native RAG, LLM inference, feedback loops, and
    WebSocket-based proactive AI.
  requirements: >-
    Full-stack application with Next.js 15 frontend (React Flow canvas, Zustand
    store, shadcn/ui, Tailwind v4) and FastAPI backend. Features: real-time
    WebSocket communication with shadow graphs and proactive AI, multi-tier
    suggestion engine (pattern -> graph analysis -> cache -> RAG -> LLM),
    graph-native structural retrieval using WL hash and VF2 isomorphism
    (no embeddings needed), 3-tier suggestion cache (exact -> WL hash ->
    pattern), user feedback loop with confidence adjustment, command palette
    (Cmd+K) with WS and HTTP SSE fallback, PostgreSQL with pgvector and
    Alembic migrations, llm-gateway for provider-agnostic LLM calls
    (anthropic, local_claude, fake), comprehensive test suite (unit,
    integration, e2e) with visual prediction review tooling.
  context_files:
    - PLAN.md
    - ARCHITECTURE.md
    - specs/
  type: new

mode: production-ready

strategy: auto-pilot

cost:
  max_development_cost: 100

agents:
  team_profile: custom
  include:
    - team-leader
    - architect
    - backend-developer
    - frontend-developer
    - qa-engineer
    - devops-specialist
    - security-tester
    - critic
  allow_sub_agent_spawning: true

tech_stack:
  languages:
    - python
    - typescript
  frameworks:
    - fastapi
    - nextjs
    - react
    - tailwindcss
  databases:
    - postgresql
  infrastructure:
    - docker

atlassian:
  enabled: false

agent_naming:
  enabled: true
  style: codename

llm_gateway:
  enabled: true
  local_claude_model: claude-sonnet-4-20250514
  enable_local_claude: true
  cost_tracking: true

refinement:
  enabled: true
  provider: local_claude
  model: claude-opus-4-6
  score_threshold: 90
  max_iterations: 5
  max_concurrency: 0
  timeout_seconds: 300

non_negotiables:
  - All LLM calls MUST use llm-gateway — no direct vendor SDK imports
  - Graceful degradation for all optional components (DB, LLM, cache)
  - Structured logging with structlog for all services
  - Type annotations on every function signature
  - Test coverage minimum 80% per module
