project:
  description: >-
    E-commerce marketplace with multi-vendor support
    and payment processing
  requirements: >-
    Build an e-commerce marketplace platform. Features: vendor
    onboarding and storefront, product catalog with search and
    filters, shopping cart and checkout, Stripe payment processing,
    order management with status tracking, vendor dashboard with
    sales analytics, customer reviews and ratings, inventory
    management, email notifications (order confirmation, shipping
    updates), admin panel for marketplace management. Tech: React
    + Next.js frontend, Python Django backend with DRF, PostgreSQL,
    Redis for caching/sessions, Celery for async tasks, S3 for
    media storage. Atlassian integration for team coordination.
  type: new
mode: production-ready
strategy: micro-manage
cost:
  max_development_cost: 50
agents:
  team_profile: full
  exclude: []
  additional: []
  include: []
  allow_sub_agent_spawning: true
  custom_instructions: {}
tech_stack:
  languages:
    - typescript
    - python
  frameworks:
    - next.js
    - django
    - tailwind
  databases:
    - postgresql
    - redis
  infrastructure: []
atlassian:
  enabled: true
  jira_project_key: PROJ
  jira_base_url: https://forge-test.atlassian.net
  confluence_space_key: FORGETEST
  confluence_base_url: https://forge-test.atlassian.net/wiki
  create_sprint_board: true
  create_confluence_space: true
  scrum_ceremonies: true
agent_naming:
  enabled: true
  style: functional
llm_gateway:
  enabled: true
  local_claude_model: claude-opus-4-6
  enable_local_claude: true
  cost_tracking: true
