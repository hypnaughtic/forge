project:
  description: >-
    Developer portfolio website with blog and
    project showcase
  requirements: >-
    Build a developer portfolio website. Features: landing page
    with hero section, about page, project showcase with
    screenshots, blog with markdown support, contact form, dark
    mode toggle, responsive design. Tech: Astro with React
    islands, Tailwind CSS, MDX for blog posts. No backend — static
    site with optional serverless functions for contact form.
    Deploy to Vercel.
  type: new
mode: mvp
strategy: auto-pilot
cost:
  max_development_cost: 50
agents:
  team_profile: lean
  exclude: []
  additional: []
  include: []
  allow_sub_agent_spawning: false
  custom_instructions: {}
tech_stack:
  languages:
    - typescript
  frameworks:
    - astro
    - react
    - tailwind
  databases: []
  infrastructure: []
atlassian:
  enabled: false
agent_naming:
  enabled: false
  style: creative
llm_gateway:
  enabled: true
  local_claude_model: claude-opus-4-6
  enable_local_claude: true
  cost_tracking: true
