name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: yamllint -c .yamllint.yml .pre-commit-config.yaml .yamllint.yml .github/workflows/*.yml

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2
      - name: Run markdownlint
        run: markdownlint-cli2 "README.md" "CHANGELOG.md"

  test:
    name: Tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[test]"
      - name: Run tests with coverage
        env:
          FORGE_TEST_DRY_RUN: "1"
        run: >-
          python -m pytest
          tests/test_generators.py
          tests/test_config_schema.py
          tests/test_config_loader.py
          tests/test_refinement.py
          tests/test_init_wizard.py
          tests/test_context_summarizer.py
          tests/test_integration.py
          tests/test_co_planner.py
          --cov=forge_cli
          --cov-fail-under=90
          -v --tb=short
