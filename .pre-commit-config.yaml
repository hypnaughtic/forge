repos:
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yml"]
        files: \.(yaml|yml)$

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        files: \.md$
        exclude: ^tests/quality_cases/

  - repo: local
    hooks:
      - id: pytest-unit
        name: Python unit tests with coverage
        entry: >-
          python -m pytest
          tests/test_generators.py
          tests/test_config_schema.py
          tests/test_config_loader.py
          tests/test_refinement.py
          tests/test_init_wizard.py
          tests/test_context_summarizer.py
          --cov=forge_cli
          --cov-fail-under=75
          -x -q --tb=short
        language: system
        pass_filenames: false
        files: (^forge_cli/|^tests/)
        stages: [pre-commit]
