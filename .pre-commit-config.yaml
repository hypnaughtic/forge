repos:
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yml"]
        files: \.(yaml|yml)$

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        files: \.md$
        exclude: ^tests/quality_cases/

  - repo: local
    hooks:
      - id: pytest-full
        name: Full test suite with coverage (dry-run)
        entry: >-
          env FORGE_TEST_DRY_RUN=1 COVERAGE_FILE=/tmp/.forge-coverage
          python -m pytest
          tests/test_generators.py
          tests/test_config_schema.py
          tests/test_config_loader.py
          tests/test_refinement.py
          tests/test_init_wizard.py
          tests/test_context_summarizer.py
          tests/test_main.py
          tests/test_progress.py
          tests/test_integration.py
          tests/test_co_planner.py
          tests/test_context_quality.py
          --cov=forge_cli
          --cov-fail-under=90
          -x -q --tb=short
        language: system
        pass_filenames: false
        files: (^forge_cli/|^tests/)
        stages: [pre-commit]
