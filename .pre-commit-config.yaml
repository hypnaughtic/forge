repos:
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yml"]
        files: \.(yaml|yml)$

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        files: \.md$
        exclude: ^tests/quality_cases/

  - repo: local
    hooks:
      - id: pytest-full
        name: Full test suite with coverage (dry-run)
        entry: >-
          bash -c '
          FORGE_TEST_DRY_RUN=1 COVERAGE_FILE=/tmp/.forge-coverage
          python -m pytest
          tests/
          --cov=forge_cli
          --cov-report=json:coverage.json
          --cov-fail-under=90
          -x -q --tb=short
          && python scripts/check_per_file_coverage.py --min-coverage 90
          '
        language: system
        pass_filenames: false
        files: (^forge_cli/|^tests/)
        stages: [pre-commit]
